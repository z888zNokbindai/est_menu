<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estella Khaoyai Menu</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #ffffff;
      color: #2a2a2a;
      font-family: "Noto Sans Thai", sans-serif;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .card {
      width: 100%;
      max-width: 520px;
      background: #ffffff;
      border: 1px solid #e6ece7;
      border-radius: 28px;
      padding: 42px 28px 30px;
      text-align: center;
      box-shadow: 0 18px 50px rgba(20, 45, 32, 0.08);
    }

    .brand {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: 3rem;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #173d2d;
    }

    .divider {
      width: 78px;
      height: 2px;
      margin: 18px auto 18px;
      border: 0;
      background: #c8a96b;
    }

    .subtitle-th {
      margin: 0;
      font-size: 1rem;
      font-weight: 500;
      color: #4c5c52;
    }

    .subtitle-en {
      margin: 6px 0 30px;
      font-size: 0.92rem;
      font-weight: 400;
      color: #7b857e;
    }

    .menu-buttons {
      display: grid;
      gap: 16px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 18px 20px;
      border-radius: 18px;
      text-decoration: none;
      text-align: center;
      color: #ffffff !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .btn-food {
      background-color: #173d2d !important;
      color: #ffffff !important;
      border: 1px solid #173d2d;
      box-shadow: 0 10px 24px rgba(23, 61, 45, 0.18);
    }

    .btn-drink {
      background-color: #b8965c !important;
      color: #ffffff !important;
      border: 1px solid #b8965c;
      box-shadow: 0 10px 24px rgba(184, 150, 92, 0.20);
    }

    .title-th {
      display: block;
      font-size: 1.08rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .title-en {
      display: block;
      margin-top: 5px;
      font-size: 0.92rem;
      font-weight: 400;
      opacity: 0.95;
      letter-spacing: 0.2px;
    }

    .footer-note {
      margin-top: 24px;
      font-size: 0.88rem;
      color: #8a918c;
    }

    @media (max-width: 480px) {
      body {
        padding: 18px;
      }

      .card {
        padding: 34px 20px 24px;
        border-radius: 22px;
      }

      .brand {
        font-size: 2.35rem;
      }

      .title-th {
        font-size: 1rem;
      }

      .title-en {
        font-size: 0.86rem;
      }
    }

    @media print {
      body {
        padding: 0;
        background: #ffffff !important;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }

      .card {
        max-width: 100%;
        border: 1px solid #e6ece7 !important;
        box-shadow: none !important;
      }

      .btn,
      .btn-food,
      .btn-drink {
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1 class="brand">Estella Khaoyai</h1>
    <div class="divider"></div>

    <p class="subtitle-th">กรุณาเลือกเมนูที่ต้องการ</p>
    <p class="subtitle-en">Please select your preferred menu</p>

    <div class="menu-buttons">
      <a class="btn btn-food" href="https://z888znokbindai.github.io/est_menu/food" target="_blank">
        <span class="title-th">เมนูอาหาร</span>
        <span class="title-en">Food Menu</span>
      </a>

      <a class="btn btn-drink" href="https://z888znokbindai.github.io/est_menu/drink" target="_blank">
        <span class="title-th">เมนูเครื่องดื่ม</span>
        <span class="title-en">Beverage Menu</span>
      </a>
    </div>

    <div class="footer-note">
      Scan once, choose your menu anytime
    </div>
  </div>
</body>
</html>
