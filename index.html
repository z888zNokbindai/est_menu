<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>เมนูอาหาร</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: sans-serif;
    }
    .topbar {
      padding: 12px;
      background: #ffffff;
      border-bottom: 1px solid #ddd;
      text-align: center;
    }
    .pdf-wrap {
      height: calc(100% - 58px);
    }
    object {
      width: 100%;
      height: 100%;
      border: none;
    }
    a.button {
      display: inline-block;
      padding: 10px 14px;
      text-decoration: none;
      border: 1px solid #333;
      border-radius: 8px;
      color: #111;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="button" href="menu.pdf" target="_blank">เปิดเมนูแบบเต็ม</a>
  </div>

  <div class="pdf-wrap">
    <object data="food.pdf" type="application/pdf">
      <p>อุปกรณ์นี้ไม่รองรับการแสดง PDF ในหน้าเว็บ
      <a href="food.pdf" target="_blank">กดที่นี่เพื่อเปิดเมนู</a></p>
    </object>
  </div>
</body>
</html>
